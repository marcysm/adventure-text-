<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Adventure Text — experiência narrativa interativa"
  >

  <title>Adventure Text</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="terminal">
    <section class="terminal__screen">
      <div class="terminal__status" aria-hidden="true">
        <span id="status-light" class="status-light"></span>

        <span id="connection-label">
          INICIANDO SISTEMA
        </span>
      </div>

      <p class="terminal__label">
        ARQUIVO NARRATIVO
      </p>

      <h1>ADVENTURE TEXT</h1>

      <p class="terminal__message">
        Estabelecendo conexão com o arquivo central.
      </p>

      <p class="terminal__message">
        Aguarde enquanto sua identidade é verificada.
      </p>

      <div class="terminal__divider"></div>

      <div class="player-data">
        <p class="player-data__label">
          IDENTIFICAÇÃO LOCAL
        </p>

        <p id="player-code" class="player-data__value">
          GERANDO...
        </p>
      </div>

      <p
        id="system-status"
        class="terminal__system-status"
        aria-live="polite"
      >
        Conectando ao Supabase...
      </p>

      <button
        id="test-button"
        type="button"
        disabled
      >
        TESTAR SALVAMENTO
      </button>
    </section>
  </main>

  <!-- Biblioteca oficial supabase-js pela CDN. -->
  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
  ></script>

  <!-- Configuração do projeto. -->
  <script src="config.js"></script>

  <!-- Funcionamento da página. -->
  <script src="app.js"></script>
</body>
</html>
