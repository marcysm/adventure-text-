<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Adventure Text — experiência narrativa interativa"
  >

  <title>Adventure Text</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="terminal">
    <section class="terminal__screen">
      <div class="terminal__status" aria-hidden="true">
        <span class="status-light"></span>
        <span>SISTEMA ATIVO</span>
      </div>

      <p class="terminal__label">
        ARQUIVO NARRATIVO
      </p>

      <h1>ADVENTURE TEXT</h1>

      <p class="terminal__message">
        A conexão foi estabelecida.
      </p>

      <p class="terminal__message">
        O sistema narrativo ainda está sendo preparado.
      </p>

      <div class="terminal__divider"></div>

      <p id="system-status" class="terminal__system-status">
        Verificando arquivos...
      </p>

      <button id="test-button" type="button">
        EXECUTAR TESTE
      </button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
